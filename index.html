<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Realtor Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #bar {
      padding: 10px;
      background: #111827;
    }
    button {
      padding: 10px;
      margin-right: 10px;
      border: 0;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #map { height: calc(100vh - 50px); }
  </style>
</head>

<body>

<div id="bar">
  <button onclick="go()">📍 My Location</button>
  <button onclick="save()">💾 Save Location</button>
</div>

<div id="map"></div>

<script>

const API_URL = "YOUR_GOOGLE_SCRIPT_EXEC_URL_HERE";

let map;
let markers = [];

/* ================= MAP ================= */
function init() {
  map = L.map('map').setView([47.4, -122.2], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  load();
}

/* ================= GPS ================= */
function go() {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 17);
  });
}

/* ================= SAVE ================= */
function save() {
  navigator.geolocation.getCurrentPosition(pos => {
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      })
    }).then(() => load());
  });
}

/* ================= LOAD ================= */
function load() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach(p => {
        const m = L.marker([p.lat, p.lng]).addTo(map);

        m.bindPopup(`
          <b>Saved Location</b><br>
          <a target="_blank"
             href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}">
             Directions
          </a>
        `);

        markers.push(m);
      });

    });
}

init();

</script>

</body>
</html>
