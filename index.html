<!DOCTYPE html>
<html>
<head>
  <title>Realtor Location Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    #topbar {
      padding: 10px;
      background: #1e293b;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    #map {
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

<div id="topbar">
  <button onclick="goToMyLocation()">📍 Go to My Location</button>
  <button onclick="saveMyLocation()">💾 Save My Location</button>
</div>

<div id="map"></div>

<script>
const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

let map;
let userMarker = null;
let markers = [];

function initMap() {
  map = L.map('map').setView([47.4, -122.2], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  loadMarkers();

  // auto-try location on load
  goToMyLocation();

  setTimeout(() => map.invalidateSize(), 500);
}

/* =========================
   📍 GET USER LOCATION
========================= */

function goToMyLocation() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      map.setView([lat, lng], 16);

      // blue dot marker
      if (userMarker) map.removeLayer(userMarker);

      userMarker = L.circleMarker([lat, lng], {
        radius: 8
      }).addTo(map);

    },
    err => {
      alert("Location blocked: " + err.message);
    }
  );
}

/* =========================
   💾 SAVE LOCATION
========================= */

function saveMyLocation() {
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ lat, lng })
      });

      alert("Saved location!");
      loadMarkers();
    },
    err => {
      alert("Cannot save location: " + err.message);
    }
  );
}

/* =========================
   📦 LOAD MARKERS
========================= */

function loadMarkers() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach((row) => {
        const lat = row[1];
        const lng = row[2];

        const marker = L.marker([lat, lng]).addTo(map);

        marker.bindPopup(`
          <b>Saved Spot</b><br><br>
          <button onclick="openMaps(${lat},${lng})">🧭 Navigate</button>
        `);

        markers.push(marker);
      });
    });
}

/* =========================
   🧭 NAVIGATION
========================= */

function openMaps(lat, lng) {
  window.open(`https://www.google.com/maps?q=${lat},${lng}`);
}

/* =========================
   🚀 START
========================= */

window.onload = initMap;

</script>

</body>
</html>
