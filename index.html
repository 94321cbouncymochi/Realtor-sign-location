<!DOCTYPE html>
<html>
<head>
  <title>Realtor Map Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #topbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #1e293b;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    #map {
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

<div id="topbar">
  <button onclick="goToMyLocation()">📍 My Location</button>
  <button onclick="saveMyLocation()">💾 Save Location</button>
</div>

<div id="map"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyH72cVKuncJmAxC5xTWN8EHoS1_31a9RUqRcKpy0bhGFhKYId_6DWJaBplXTDgGGGw/exec";

let map;
let markers = [];
let userMarker = null;

/* =========================
   🗺️ INIT MAP
========================= */
function initMap() {
  map = L.map('map');

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  map.setView([47.4, -122.2], 12);

  // 🔥 WAIT FOR MAP TO FULLY ATTACH
  setTimeout(() => {
    map.invalidateSize();
    loadMarkers();
  }, 1000);
}

/* =========================
   📍 GPS LOCATION
========================= */
function goToMyLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      map.setView([lat, lng], 17);

      // ❌ removed user marker completely
      console.log("Location centered:", lat, lng);
    },
    (err) => {
      alert("GPS error: " + err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 15000
    }
  );
}

/* =========================
   💾 SAVE LOCATION
========================= */
function saveMyLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ lat, lng })
      })
      .then(res => res.text())
      .then(txt => {
        console.log("SAVE:", txt);
        alert("Saved!");
        loadMarkers();
      })
      .catch(err => alert("Save failed"));
    },
    (err) => {
      alert("GPS error: " + err.message);
    }
  );
}

/* =========================
   📦 LOAD MARKERS (FIXED)
========================= */
function loadMarkers() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      console.log("DATA:", data);

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach((item) => {

        const lat = Number(item.lat);
        const lng = Number(item.lng);

        if (isNaN(lat) || isNaN(lng)) return;

        const marker = L.marker([lat, lng]).addTo(map);

        marker.bindPopup(`
          <b>Saved Location</b><br><br>
          <button onclick="openDirections(${lat}, ${lng})">
            🧭 Get Directions
          </button>
        `);

        markers.push(marker);
      });

      console.log("Markers loaded:", markers.length);
    })
    .catch(err => console.log("LOAD ERROR:", err));
}

/* =========================
   🧭 DIRECTIONS
========================= */
function openDirections(lat, lng) {
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  window.open(url, "_blank");
}

/* =========================
   🚀 START
========================= */
window.onload = initMap;

</script>

</body>
</html>
