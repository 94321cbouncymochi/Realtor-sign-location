<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Realtor Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #bar {
      padding: 10px;
      background: #111827;
    }
    button {
      padding: 10px;
      margin-right: 10px;
      border: 0;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #map { height: calc(100vh - 50px); }
  </style>
</head>

<body>

<div id="bar">
  <button onclick="go()">📍 My Location</button>
  <button onclick="save()">💾 Save Location</button>
</div>

<div id="map"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyH72cVKuncJmAxC5xTWN8EHoS1_31a9RUqRcKpy0bhGFhKYId_6DWJaBplXTDgGGGw/exec";

let map;
let markers = [];

/* ================= MAP ================= */
function init() {
  map = L.map('map').setView([47.4, -122.2], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  load();
}

/* ================= GPS ================= */
function go() {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 17);
  });
}

/* ================= SAVE ================= */
function save() {
  navigator.geolocation.getCurrentPosition(pos => {
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      })
    }).then(() => load());
  });
}

/* ================= LOAD ================= */
function load() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      console.log("DATA RECEIVED:", data);

      // clear old markers safely
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      if (!Array.isArray(data)) {
        console.error("NOT ARRAY:", data);
        return;
      }

      let points = [];

      data.forEach((p, i) => {

        console.log("RAW POINT:", p);

        const lat = parseFloat(p.lat);
        const lng = parseFloat(p.lng);

        console.log("PARSED:", lat, lng);

        if (isNaN(lat) || isNaN(lng)) {
          console.warn("SKIPPED BAD POINT:", p);
          return;
        }

        const marker = L.marker([lat, lng]).addTo(map);

        marker.bindPopup("Saved Location");

        markers.push(marker);
        points.push([lat, lng]);
      });

      console.log("TOTAL MARKERS:", markers.length);

      // 🔥 FORCE VIEW TO MARKERS (CRITICAL)
      if (points.length > 0) {
        map.fitBounds(points, { padding: [50, 50] });
      }

    })
    .catch(err => console.error("FETCH ERROR:", err));
}

init();

</script>

</body>
</html>
