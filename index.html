<!DOCTYPE html>
<html>
<head>
  <title>Realtor Map Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #topbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #1e293b;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    #map {
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

<div id="topbar">
  <button onclick="goToMyLocation()">📍 Go to My Location</button>
  <button onclick="saveMyLocation()">💾 Save My Location</button>
</div>

<div id="map"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyH72cVKuncJmAxC5xTWN8EHoS1_31a9RUqRcKpy0bhGFhKYId_6DWJaBplXTDgGGGw/exec";

let map;
let markers = [];
let userMarker = null;
let gpsLock = false;

/* =========================
   🗺️ INIT MAP
========================= */
function initMap() {
  map = L.map('map').setView([47.4, -122.2], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  loadMarkers();

  setTimeout(() => map.invalidateSize(), 300);
}

/* =========================
   📍 GO TO LOCATION (FIXED)
========================= */
function goToMyLocation() {
  if (gpsLock) return;
  gpsLock = true;

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    gpsLock = false;
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      gpsLock = false;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      console.log("GPS:", lat, lng);

      if (!map) {
        alert("Map not loaded yet");
        return;
      }

      map.setView([lat, lng], 17);

      if (userMarker) {
        map.removeLayer(userMarker);
      }

      userMarker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup("📍 You are here")
        .openPopup();
    },

    (err) => {
      gpsLock = false;
      alert("GPS error: " + err.message);
      console.log(err);
    },

    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );
}

/* =========================
   💾 SAVE LOCATION (FIXED)
========================= */
function saveMyLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ lat, lng })
      })
      .then(res => res.text())
      .then(txt => {
        console.log("SAVE:", txt);
        alert("Saved!");
        loadMarkers();
      })
      .catch(err => {
        console.log(err);
        alert("Save failed");
      });
    },
    (err) => {
      alert("GPS error: " + err.message);
    }
  );
}

/* =========================
   📦 LOAD MARKERS
========================= */
function loadMarkers() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach((row) => {
        const lat = row[1];
        const lng = row[2];

        const marker = L.marker([lat, lng]).addTo(map);

        marker.bindPopup(`
          <b>Saved Location</b><br><br>
          <button onclick="openMaps(${lat},${lng})">🧭 Navigate</button>
        `);

        markers.push(marker);
      });
    })
    .catch(err => console.log("LOAD ERROR:", err));
}

/* =========================
   🧭 NAVIGATE
========================= */
function openMaps(lat, lng) {
  window.open(`https://www.google.com/maps?q=${lat},${lng}`);
}

/* =========================
   🚀 START
========================= */
window.onload = initMap;

</script>

</body>
</html>
